name: Feature request
description: Propose an improvement or a new capability.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The underlying need — not (only) the solution you have in mind.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: If you have a shape in mind, sketch it here.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - new tool parser (e.g. Gemini CLI, OpenCode)
        - dashboard
        - daemon platforms (Linux, Windows)
        - deployment / self-hosting
        - API
        - other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
