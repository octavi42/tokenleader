<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="leaderboard">
  <!-- Favicon variant of the neutral mark — same tile-plus-ascending-bars
       artwork as logo.svg, kept as a separate file so operators can override
       the tab icon independently via <data-dir>/brand/favicon.svg. -->
  <style>
    .tile { fill: #18181b; }
    .bar { fill: #fafafa; }
    @media (prefers-color-scheme: dark) {
      .tile { fill: #fafafa; }
      .bar { fill: #18181b; }
    }
  </style>
  <rect class="tile" width="100" height="100" rx="22"/>
  <rect class="bar" x="18" y="56" width="16" height="26" rx="4"/>
  <rect class="bar" x="42" y="40" width="16" height="42" rx="4"/>
  <rect class="bar" x="66" y="22" width="16" height="60" rx="4"/>
</svg>
