<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="leaderboard">
  <!-- Neutral tokenleader mark: ascending bars on a rounded tile. The tile
       gives the mark internal contrast, so it reads on light AND dark
       backgrounds even when the page theme disagrees with the OS theme;
       prefers-color-scheme flips it for the common case. Operators replace
       this by dropping their own logo.svg into <data-dir>/brand/. -->
  <style>
    .tile { fill: #18181b; }
    .bar { fill: #fafafa; }
    @media (prefers-color-scheme: dark) {
      .tile { fill: #fafafa; }
      .bar { fill: #18181b; }
    }
  </style>
  <rect class="tile" width="100" height="100" rx="22"/>
  <rect class="bar" x="18" y="56" width="16" height="26" rx="4"/>
  <rect class="bar" x="42" y="40" width="16" height="42" rx="4"/>
  <rect class="bar" x="66" y="22" width="16" height="60" rx="4"/>
</svg>
