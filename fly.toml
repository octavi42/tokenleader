app = "tokenleader"           # users rename on launch
primary_region = "iad"        # users pick at launch

kill_signal = "SIGTERM"
kill_timeout = "30s"          # > the 8s drain cap

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  TOKENLEADER_DATA_DIR = "/data"
  # TOKENLEADER_SERVER_URL = "https://tokenleader.fly.dev"   # set after launch

[mounts]
  source = "tokenleader_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"    # in-process mirror loops need always-on
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
